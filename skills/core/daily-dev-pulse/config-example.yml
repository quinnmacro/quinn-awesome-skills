# Daily Dev Pulse Configuration Example
# Copy to ~/.quinn-skills/pulse-config.yml and customize

# GitHub repositories to monitor
repos:
  - name: quinnpm
    owner: quinnmacro
  - name: SanctionList
    owner: quinnmacro
  - name: quinn-awesome-skills
    owner: quinnmacro
  - name: quinnweb
    owner: quinnmacro
  - name: gnhf
    owner: quinnmacro
  - name: weather-cli
    owner: quinnmacro

# Tech stack for security scanning
tech_stack:
  python: "3.13"
  frameworks:
    - FastAPI
    - Next.js
  databases:
    - SQLite
  libraries:
    - LangGraph

# Package dependencies to watch for updates
dependencies:
  npm:
    - next
    - react
    - tailwindcss
  pypi:
    - fastapi
    - uvicorn
    - langgraph
    - sqlalchemy
    - pyyaml
    - requests

# Display and behavior preferences
preferences:
  # News sources to aggregate
  news_sources:
    - hn          # Hacker News
    - devto       # Dev.to
    - lobsters    # Lobsters

  # Output format: terminal, md, json
  format: terminal

  # How many days of GitHub activity to look back
  lookback_days: 7

  # How many days of CVE history to check (longer window than activity)
  security_lookback_days: 30

  # PRs open longer than this are flagged as stale
  stale_pr_days: 3

  # Seconds between NVD API calls (rate limit: 5 req/30s without key)
  # Set to 0 for testing or with an API key
  nvd_rate_limit: 6

  # Max open issues flagged per repo in action items (only recent issues within lookback_days)
  max_issues_per_repo: 3

  # Max total action items in final output (caps the todo section size)
  max_action_items: 10

  # Max PRs/issues fetched per repo via gh CLI (controls API request size)
  max_prs_fetch: 20

  # Max CI runs fetched per repo (controls how many recent workflow runs to check)
  max_ci_runs_fetch: 5

  # Max news items fetched per source (HN, Dev.to, Lobsters each)
  max_news_per_source: 10