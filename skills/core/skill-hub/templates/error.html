{% extends "base.html" %}
{% set title = "Error" %}
{% block content %}
<div class="detail" style="text-align:center;">
  <h1 style="font-size:48px;color:var(--red);">{{ status_code }}</h1>
  <p style="font-size:18px;color:var(--text-muted);margin-top:12px;">{{ message }}</p>
  {% if skill_name %}
  <p style="font-size:14px;color:var(--text-muted);margin-top:8px;">Skill '{{ skill_name }}' was not found in the database or on disk.</p>
  {% endif %}
  <div style="margin-top:24px;display:flex;gap:12px;justify-content:center;">
    <a href="/" class="btn">Back to Skills</a>
    <a href="/health" class="btn secondary">Health Dashboard</a>
  </div>
</div>
{% endblock %}
