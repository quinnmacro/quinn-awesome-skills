<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skill Hub - {{ title }}</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230d1117'/><path d='M8 16h16M16 8v16' stroke='%2358a6ff' stroke-width='3' stroke-linecap='round'/></svg>">
  <style>
    :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #c9d1d9; --text-muted: #8b949e; --accent: #58a6ff; --green: #3fb950; --red: #f85149; --yellow: #d29922; --purple: #bc8cff; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
    nav { background: var(--card); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 20px; }
    nav a { color: var(--text); text-decoration: none; font-size: 14px; }
    nav a:hover, nav a.active { color: var(--accent); }
    nav .logo { font-weight: 700; font-size: 18px; color: var(--accent); }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; flex: 1; }
    .search-bar { display: flex; gap: 12px; margin-bottom: 24px; }
    .search-bar input { flex: 1; padding: 10px 16px; background: var(--card); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 14px; }
    .search-bar input:focus { outline: none; border-color: var(--accent); }
    .search-bar button { padding: 10px 20px; background: var(--accent); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
    .stats-row { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px 20px; flex: 1; min-width: 120px; }
    .stat-card .label { font-size: 12px; color: var(--text-muted); }
    .stat-card .value { font-size: 28px; font-weight: 700; color: var(--accent); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; transition: border-color 0.2s; cursor: default; }
    .card:hover { border-color: var(--accent); }
    .card h3 { font-size: 16px; color: var(--text); margin-bottom: 8px; }
    .card h3 a { color: var(--text); text-decoration: none; }
    .card h3 a:hover { color: var(--accent); }
    .card .desc { font-size: 13px; color: var(--text-muted); margin-bottom: 12px; line-height: 1.5; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }
    .card .meta { display: flex; gap: 8px; font-size: 12px; flex-wrap: wrap; align-items: center; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
    .badge.core { background: #1f6feb33; color: var(--accent); }
    .badge.external { background: #bc8cff33; color: var(--purple); }
    .badge.passing { background: #3fb95033; color: var(--green); }
    .badge.failing { background: #f8514933; color: var(--red); }
    .badge.unknown { background: #d2992233; color: var(--yellow); }
    .badge.completed { background: #3fb95033; color: var(--green); }
    .badge.failed { background: #f8514933; color: var(--red); }
    .badge.error { background: #f8514933; color: var(--red); }
    .badge.pending { background: #d2992233; color: var(--yellow); }
    .badge.pip { background: #58a6ff33; color: var(--accent); }
    .badge.brew { background: #3fb95033; color: var(--green); }
    .badge.npm { background: #bc8cff33; color: var(--purple); }
    .version { color: var(--text-muted); }
    .detail { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 24px; }
    .detail h1 { font-size: 24px; color: var(--text); margin-bottom: 4px; }
    .detail .meta-row { display: flex; gap: 12px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
    .md-content { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 16px; white-space: pre-wrap; font-family: monospace; font-size: 13px; line-height: 1.6; max-height: 600px; overflow-y: auto; }
    .md-rendered { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 16px; font-size: 14px; line-height: 1.7; max-height: 600px; overflow-y: auto; }
    .md-rendered h1 { font-size: 22px; color: var(--text); margin: 16px 0 8px; }
    .md-rendered h2 { font-size: 18px; color: var(--text); margin: 14px 0 6px; }
    .md-rendered h3 { font-size: 16px; color: var(--text); margin: 12px 0 4px; }
    .md-rendered h4 { font-size: 14px; color: var(--text-muted); margin: 10px 0 4px; }
    .md-rendered p { margin: 8px 0; color: var(--text); }
    .md-rendered ul { padding-left: 20px; margin: 8px 0; }
    .md-rendered ol { padding-left: 20px; margin: 8px 0; }
    .md-rendered li { margin: 4px 0; color: var(--text); }
    .md-rendered blockquote { border-left: 3px solid var(--accent); padding: 8px 16px; margin: 12px 0; color: var(--text-muted); background: rgba(88,166,255,0.05); border-radius: 0 4px 4px 0; }
    .md-rendered hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
    .md-rendered table { border-collapse: collapse; margin: 12px 0; width: auto; }
    .md-rendered table th { background: var(--card); padding: 8px 12px; border: 1px solid var(--border); font-weight: 600; color: var(--text-muted); text-align: left; }
    .md-rendered table td { padding: 8px 12px; border: 1px solid var(--border); color: var(--text); }
    .md-rendered pre { background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 12px; overflow-x: auto; margin: 12px 0; }
    .md-rendered code { font-family: monospace; font-size: 13px; }
    .md-rendered p code, .md-rendered li code { background: var(--card); padding: 2px 6px; border-radius: 3px; font-size: 12px; }
    .md-rendered a { color: var(--accent); text-decoration: none; }
    .md-rendered a:hover { text-decoration: underline; }
    .md-rendered strong { color: var(--text); font-weight: 600; }
    .md-rendered em { color: var(--text-muted); }
    .file-list { list-style: none; padding: 0; }
    .file-list li { padding: 6px 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
    .file-list li:last-child { border-bottom: none; }
    .test-output { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 12px; font-family: monospace; font-size: 12px; white-space: pre-wrap; max-height: 400px; overflow-y: auto; }
    .btn { padding: 8px 16px; background: var(--accent); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; transition: background 0.2s; }
    .btn:hover { background: #1f6feb; }
    .btn.secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
    .btn.secondary:hover { border-color: var(--accent); color: var(--accent); }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px 12px; border-bottom: 1px solid var(--border); text-align: left; font-size: 13px; }
    th { color: var(--text-muted); font-weight: 600; }
    .health-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
    .health-item { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
    .progress-bar { background: var(--border); border-radius: 4px; height: 8px; overflow: hidden; }
    .progress-bar .fill { height: 100%; border-radius: 4px; }
    .fill.green { background: var(--green); }
    .fill.red { background: var(--red); }
    .fill.yellow { background: var(--yellow); }
    .empty { text-align: center; padding: 48px; color: var(--text-muted); }
    footer { background: var(--card); border-top: 1px solid var(--border); padding: 16px 24px; text-align: center; font-size: 12px; color: var(--text-muted); }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
    @media (max-width: 600px) {
      nav { padding: 8px 16px; gap: 12px; font-size: 12px; }
      nav .logo { font-size: 14px; }
      .container { padding: 16px; }
      .stats-row { gap: 8px; }
      .stat-card { padding: 12px 14px; }
      .stat-card .value { font-size: 20px; }
      .grid { grid-template-columns: 1fr; }
      .health-grid { grid-template-columns: 1fr; }
      .search-bar { flex-wrap: wrap; }
      .search-bar input { min-width: 0; }
      .detail { padding: 16px; }
      .detail h1 { font-size: 18px; }
      table { font-size: 12px; }
      th, td { padding: 8px; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="logo">Skill Hub</a>
    <a href="/" class="{% if nav_active == 'skills' %}active{% endif %}">Skills</a>
    <a href="/health" class="{% if nav_active == 'health' %}active{% endif %}">Health</a>
    <a href="/install" class="{% if nav_active == 'install' %}active{% endif %}">Install</a>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
  <footer>
    Skill Hub v1.0 — <a href="https://github.com/quinnmacro/quinn-awesome-skills">quinn-awesome-skills</a> — Running on localhost:{{ port }}
  </footer>
</body>
</html>
